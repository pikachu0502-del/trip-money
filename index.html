<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊分帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .modal { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; backdrop-filter: blur(4px); padding: 1rem; }
    .modal.active { display: flex; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    .loading-overlay { display: none; }
    .loading-overlay.active { display: flex; position: absolute; inset: 0; background: rgba(255,255,255,0.7); align-items: center; justify-content: center; z-index: 20; border-radius: 0.75rem; }
    [x-hidden] { display: none !important; }
  </style>
</head>
<body class="bg-[#F9FAFB] text-[#4B5563] font-bold min-h-screen p-4 md:p-8">

  <div id="mainApp" class="max-w-4xl mx-auto" x-hidden>
    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
      <button onclick="window.openModal('tripModal')" title="更換帳本" class="flex items-center gap-3 text-[#3B82F6] hover:bg-blue-50 px-4 py-2.5 rounded-lg border border-blue-100 transition-all bg-white shadow-sm">
        <i data-lucide="folder-open" class="w-5 h-5"></i>
        <div class="text-left">
          <span class="block text-[10px] text-blue-400 uppercase tracking-wider">目前帳本</span>
          <span id="currentTripName" class="text-lg leading-none">載入中...</span>
        </div>
      </button>
      <button onclick="window.openAddExpense()" class="bg-[#3B82F6] text-white px-6 py-3 rounded-lg flex items-center gap-2 hover:bg-blue-600 shadow-lg transition-all active:scale-95">
        <i data-lucide="plus" class="w-5 h-5"></i> 新增支出
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="space-y-6">
        <!-- 成員 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="users" class="w-4 h-4"></i><h2>成員名單</h2></div>
            <button onclick="window.openModal('ratesModal')" class="text-blue-500 hover:text-blue-600 flex items-center gap-1 text-xs">
              <i data-lucide="settings-2" class="w-3.5 h-3.5"></i> 匯率管理
            </button>
          </div>
          <div id="peopleList" class="flex flex-wrap gap-2 mb-4"></div>
          <div class="flex gap-2">
            <input id="newPersonInput" type="text" placeholder="新成員名稱" onkeydown="if(event.key==='Enter')window.addPerson()" class="flex-1 border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-gray-50 font-bold" />
            <button onclick="window.addPerson()" title="新增成員" class="bg-white border border-[#E5E7EB] px-3 rounded-lg hover:bg-gray-50 text-gray-400"><i data-lucide="plus" class="w-4 h-4"></i></button>
          </div>
        </div>

        <!-- 結算轉帳 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="credit-card" class="w-4 h-4"></i><h2>結算轉帳</h2></div>
            <select id="settlementCurrency" onchange="window.refreshUI()" title="結算幣別" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
          </div>
          <div id="transfersList" class="space-y-2"></div>
        </div>

        <!-- 總額彙整 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="file-text" class="w-4 h-4"></i><h2>總額彙整</h2></div>
            <select id="summaryCurrency" onchange="window.refreshUI()" title="彙整幣別" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
          </div>
          <div id="summaryList" class="space-y-4"></div>
        </div>
      </div>

      <!-- 支出明細 -->
      <div class="md:col-span-2 space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2 text-gray-500"><i data-lucide="receipt" class="w-4 h-4"></i><h2>支出明細</h2></div>
            <div class="flex items-center gap-2">
              <select id="monthFilter" onchange="window.setMonthFilter(this.value)" title="月份篩選" class="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer"></select>
              <div id="expenseCount" class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">共 0 筆</div>
            </div>
          </div>
          <div id="expenseList" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 帳本 Modal -->
  <div id="tripModal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-[#E5E7EB] overflow-hidden">
      <div class="p-5 border-b flex justify-between items-center bg-gray-50">
        <h2 id="tripModalTitle" class="text-base font-black text-gray-700">選擇帳本</h2>
        <button id="tripModalClose" onclick="window.closeModal('tripModal')" title="關閉"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <p id="tripModalHint" class="px-6 pt-4 text-xs text-gray-400 font-bold">請選擇一個帳本進入，或在下方建立新帳本</p>
      <div class="p-6 pt-3 space-y-3 max-h-96 overflow-y-auto" id="tripsContainer"></div>
      <div class="p-6 border-t">
        <div class="flex gap-2">
          <input id="newTripInput" type="text" placeholder="建立新帳本名稱" onkeydown="if(event.key==='Enter')window.createTrip()" class="flex-1 border border-gray-200 rounded-xl px-4 py-2 text-sm bg-gray-50 font-bold focus:outline-none focus:border-blue-400" />
          <button onclick="window.createTrip()" title="建立帳本" class="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 匯率 Modal -->
  <div id="ratesModal" class="modal">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
      <div class="p-5 border-b flex justify-between items-center bg-gray-50">
        <h2 class="text-base font-black flex items-center gap-2 text-gray-700"><i data-lucide="settings-2" class="w-4 h-4"></i> 匯率管理</h2>
        <button onclick="window.closeModal('ratesModal')" title="關閉"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 space-y-5">
        <p class="text-[10px] text-gray-400 font-bold">設定每 1 單位外幣兌換多少 TWD</p>
        <div id="ratesList" class="space-y-4"></div>
        <button onclick="window.closeModal('ratesModal')" class="w-full bg-[#3B82F6] text-white py-3 rounded-xl font-black text-sm hover:bg-blue-600 shadow-lg">完成設定</button>
      </div>
    </div>
  </div>

  <!-- 新增/編輯支出 Modal -->
  <div id="addExpenseModal" class="modal !items-start sm:!items-center overflow-y-auto">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl my-4 overflow-hidden flex flex-col max-h-[94vh]">
      <div class="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
        <h2 id="modalTitle" class="text-base font-black text-gray-700">新增支出</h2>
        <button onclick="window.closeModal('addExpenseModal')" title="關閉"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 space-y-4 relative overflow-y-auto">
        <div id="saveLoader" class="loading-overlay"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-500"></i></div>

        <div class="flex gap-4 items-center">
          <div class="relative w-20 h-20 shrink-0">
            <input type="file" accept="image/*" id="imgUpload" class="hidden" onchange="window.handleImgUpload(this)" />
            <label for="imgUpload" id="imgLabel" class="w-full h-full bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center cursor-pointer text-gray-400 hover:bg-gray-100 overflow-hidden">
              <i data-lucide="camera" class="w-6 h-6"></i>
              <span class="text-[10px] mt-1 font-bold">收據</span>
            </label>
            <div id="aiLoader" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center rounded-xl"><i data-lucide="loader-2" class="w-6 h-6 animate-spin text-blue-500"></i></div>
          </div>
          <div class="flex-1 space-y-3">
            <input id="expNote" type="text" placeholder="項目名稱" class="w-full border-b-2 border-gray-100 py-1 focus:border-blue-500 outline-none text-lg bg-transparent font-bold" />
            <div class="flex gap-3 items-end">
              <input id="expAmount" type="number" placeholder="金額" oninput="window.updateEstimate()" class="flex-1 border-b-2 border-gray-100 py-1 focus:border-blue-500 outline-none text-xl font-black bg-transparent" />
              <select id="expCurrency" onchange="window.updateEstimate()" title="幣別" class="border-b-2 border-gray-100 bg-transparent text-gray-500 font-bold outline-none cursor-pointer text-sm pb-1"></select>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-2">
          <div class="relative"><i data-lucide="map-pin" class="w-3.5 h-3.5 absolute left-3 top-3 text-gray-400"></i><input id="expLocation" type="text" placeholder="地點" class="w-full pl-9 pr-2 py-2.5 border border-gray-100 rounded-lg bg-gray-50 focus:border-blue-500 outline-none text-sm font-bold" /></div>
          <div class="relative"><i data-lucide="align-left" class="w-3.5 h-3.5 absolute left-3 top-3 text-gray-400"></i><input id="expRemarks" maxlength="50" type="text" placeholder="備註 (50字內)" class="w-full pl-9 pr-2 py-2.5 border border-gray-100 rounded-lg bg-gray-50 focus:border-blue-500 outline-none text-sm font-bold" /></div>
        </div>

        <div class="grid grid-cols-2 gap-3 text-sm">
          <div><label class="text-[10px] text-gray-400 block mb-1 font-bold uppercase">分類</label><select id="expCategory" class="w-full border border-gray-200 rounded-xl p-2.5 bg-gray-50 outline-none cursor-pointer font-bold"></select></div>
          <div><label class="text-[10px] text-gray-400 block mb-1 font-bold uppercase">支付方式</label><select id="expPayment" class="w-full border border-gray-200 rounded-xl p-2.5 bg-gray-50 outline-none cursor-pointer font-bold"></select></div>
          <div><label class="text-[10px] text-gray-400 block mb-1 font-bold uppercase">模式</label><select id="expSplitMethod" onchange="window.updateEstimate()" class="w-full border border-gray-200 rounded-xl p-2.5 bg-gray-50 outline-none cursor-pointer font-bold"></select></div>
          <div><label class="text-[10px] text-gray-400 block mb-1 font-bold uppercase">支付人</label><select id="expPayer" onchange="window.updateEstimate()" class="w-full border border-gray-200 rounded-xl p-2.5 bg-gray-50 outline-none cursor-pointer font-bold"></select></div>
          <div class="col-span-2"><label class="text-[10px] text-gray-400 block mb-1 font-bold uppercase">日期</label><input id="expDate" type="date" class="w-full border border-gray-200 rounded-xl p-2.5 bg-gray-50 outline-none font-bold" /></div>
        </div>

        <div>
          <label class="text-[10px] text-gray-400 block mb-2 font-bold uppercase">參與成員</label>
          <div id="participantsGroup" class="flex flex-wrap gap-2"></div>
        </div>

        <div id="estimateBox" class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 hidden space-y-2"></div>
      </div>
      <div class="p-4 border-t border-gray-50 shrink-0">
        <button id="saveBtn" onclick="window.saveExpense()" class="w-full bg-[#3B82F6] text-white py-3.5 rounded-xl font-black shadow-md active:scale-95 disabled:bg-gray-300 disabled:shadow-none flex justify-center items-center gap-2 transition-colors">確認儲存</button>
      </div>
    </div>
  </div>

  <!-- 成功 Modal -->
  <div id="successModal" class="modal">
    <div class="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-8 flex flex-col items-center">
      <div class="bg-green-50 text-green-500 p-4 rounded-full mb-4"><i data-lucide="check-circle-2" class="w-10 h-10"></i></div>
      <h2 class="text-lg font-black text-gray-700 mb-6">已儲存</h2>
      <button onclick="window.closeModal('successModal')" class="w-full bg-[#3B82F6] text-white py-3 rounded-xl font-black">確認</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwhrvO9igpNTDPkGZeZ8ocYDrNnVENk8o",
      authDomain: "money-89a0e.firebaseapp.com",
      databaseURL: "https://money-89a0e-default-rtdb.firebaseio.com",
      projectId: "money-89a0e",
      storageBucket: "money-89a0e.firebasestorage.app",
      messagingSenderId: "41518797533",
      appId: "1:41518797533:web:943b9330b0234de59f0134",
      measurementId: "G-SLTTYB5L2H"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "money-89a0e-trip-web";

    // ===== Gemini (收據辨識) — 填入金鑰才會啟用，否則自動略過 =====
    const GEMINI_API_KEY = "";
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const CURRENCIES = [
      { code: 'TWD', symbol: '$' },
      { code: 'JPY', symbol: '¥' },
      { code: 'KRW', symbol: '₩' },
      { code: 'EUR', symbol: '€' },
      { code: 'USD', symbol: '$' }
    ];
    const DEFAULT_RATES = { TWD: 1, JPY: 0.21, KRW: 0.024, EUR: 34.5, USD: 32.0 };
    const CATEGORIES = ['住宿', '餐飲', '交通', '購物', '娛樂', '雜費'];
    const PAYMENT_METHODS = ['現金', '信用卡', '行動支付'];
    const SPLIT_METHODS = ['平分', '代墊', '請客', '自訂金額'];

    // ===== state =====
    let isAuthed = false;
    let activeTripId = null;
    let trips = [];
    let people = [];
    let expenses = [];
    let rates = { ...DEFAULT_RATES };
    let expensesCache = {};
    // form state
    let editingId = null;
    let participants = [];
    let customAmounts = {};
    let previewUrl = null;
    let expandedTransferKey = null;
    let editingTripId = null;
    let selectedMonth = 'all';
    // listeners
    let unsubSettings = null;
    let unsubExpenses = null;

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const icons = () => window.lucide && window.lucide.createIcons();

    function fillCurrencySelect(el, val) {
      el.innerHTML = CURRENCIES.map(c => `<option value="${c.code}">${c.code}</option>`).join('');
      el.value = val;
    }

    function init() {
      // populate static selects
      fillCurrencySelect($('settlementCurrency'), 'TWD');
      fillCurrencySelect($('summaryCurrency'), 'TWD');

      signInAnonymously(auth).catch(err => {
        console.error('驗證失敗', err);
        $('currentTripName').innerText = '登入失敗';
      });
      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        isAuthed = true;
        const tripsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trips_list');
        onSnapshot(tripsRef, (snap) => {
          trips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderTrips();
          // 起始畫面：尚未選帳本時，彈出帳本選擇頁（當作 landing）
          if (!activeTripId) {
            updateTripModalChrome();
            window.openModal('tripModal');
          }
        });
      });
    }

    function updateTripModalChrome() {
      const hasTrip = !!activeTripId;
      $('tripModalTitle').innerText = hasTrip ? '更換帳本' : '選擇帳本';
      $('tripModalClose').style.display = hasTrip ? '' : 'none';
      $('tripModalHint').style.display = hasTrip ? 'none' : '';
    }

    window.switchTrip = (id) => {
      if (!isAuthed) return;
      activeTripId = id;
      const trip = trips.find(t => t.id === id);
      $('currentTripName').innerText = trip ? trip.name : '未選取帳本';
      // 進入帳本內部頁面
      $('mainApp').removeAttribute('x-hidden');
      updateTripModalChrome();
      renderTrips();

      if (unsubSettings) unsubSettings();
      if (unsubExpenses) unsubExpenses();

      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId);
      unsubSettings = onSnapshot(settingsRef, (d) => {
        if (d.exists()) {
          const data = d.data();
          people = Array.isArray(data.people) ? data.people : [];
          rates = data.rates ? { ...DEFAULT_RATES, ...data.rates } : { ...DEFAULT_RATES };
        } else {
          people = []; rates = { ...DEFAULT_RATES };
          setDoc(settingsRef, { people: [], rates: DEFAULT_RATES });
        }
        renderPeople();
        window.refreshUI();
      });

      const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
      unsubExpenses = onSnapshot(expensesRef, (snap) => {
        expensesCache = {};
        expenses = snap.docs.map(d => {
          const data = { dbId: d.id, ...d.data() };
          expensesCache[d.id] = data;
          return data;
        });
        expenses.sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : (b.created_at || 0) - (a.created_at || 0)));
        window.refreshUI();
      });
    };

    window.refreshUI = () => {
      renderExpenses();
      renderSummary();
      renderSettlement();
      icons();
    };

    // ===== 成員 =====
    function renderPeople() {
      $('peopleList').innerHTML = people.map((p, idx) => `
        <span class="bg-[#F3F4F6] border border-[#E5E7EB] px-3 py-1.5 rounded-lg text-sm flex items-center gap-2">
          ${esc(p)}
          <button onclick="window.removePerson(${idx})" title="刪除成員" class="text-red-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
        </span>`).join('') || `<span class="text-gray-300 text-sm">尚無成員</span>`;
      icons();
    }

    window.addPerson = async () => {
      const input = $('newPersonInput');
      const name = input.value.trim();
      if (name && activeTripId && isAuthed && !people.includes(name)) {
        const newPeople = [...people, name];
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { people: newPeople }, { merge: true });
        input.value = '';
      }
    };

    window.removePerson = async (idx) => {
      if (!activeTripId || !isAuthed) return;
      const newPeople = people.filter((_, i) => i !== idx);
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { people: newPeople }, { merge: true });
    };

    // ===== 帳本 =====
    function renderTrips() {
      $('tripsContainer').innerHTML = trips.map(t => {
        if (editingTripId === t.id) {
          return `<div class="flex gap-2 items-center">
            <input id="editTripInput" value="${esc(t.name)}" onkeydown="if(event.key==='Enter')window.saveTripName('${t.id}')" class="flex-1 border-2 border-blue-400 rounded-xl px-4 py-2 text-sm outline-none font-bold" />
            <button onclick="window.saveTripName('${t.id}')" title="儲存" class="text-green-500 p-2"><i data-lucide="check" class="w-5 h-5"></i></button>
          </div>`;
        }
        const active = activeTripId === t.id;
        return `<div class="flex gap-2 items-center group">
          <button onclick="window.switchTrip('${t.id}'); window.closeModal('tripModal')" class="flex-1 text-left p-4 rounded-xl border-2 transition-all flex items-center justify-between ${active ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-gray-50 hover:border-blue-200 hover:bg-gray-50'} font-bold">
            <span>${esc(t.name)}</span>${active ? '<i data-lucide="chevron-right" class="w-4 h-4"></i>' : ''}
          </button>
          <div class="flex flex-col gap-1 opacity-60 sm:opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="window.startEditTrip('${t.id}')" title="重新命名" class="p-1.5 text-gray-400 hover:text-blue-500"><i data-lucide="pencil" class="w-4 h-4"></i></button>
            <button onclick="window.deleteTrip('${t.id}')" title="刪除帳本" class="p-1.5 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>`;
      }).join('') || `<p class="text-gray-300 text-center py-4">尚無帳本，請在下方建立</p>`;
      icons();
    }

    window.startEditTrip = (id) => { editingTripId = id; renderTrips(); setTimeout(() => $('editTripInput')?.focus(), 30); };
    window.saveTripName = async (id) => {
      const v = $('editTripInput').value.trim();
      if (v) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_list', id), { name: v });
      editingTripId = null; renderTrips();
    };
    window.deleteTrip = async (id) => {
      if (!confirm('確定刪除此帳本？此動作無法復原。')) return;
      await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_list', id));
      if (activeTripId === id) {
        const remaining = trips.filter(t => t.id !== id);
        if (remaining.length > 0) switchTrip(remaining[0].id);
        else {
          activeTripId = null; people = []; expenses = [];
          $('currentTripName').innerText = '未選取帳本';
          $('mainApp').setAttribute('x-hidden', '');
          renderPeople(); window.refreshUI();
          updateTripModalChrome(); window.openModal('tripModal');
        }
      }
    };
    window.createTrip = async () => {
      if (!isAuthed) return;
      const input = $('newTripInput');
      const name = input.value.trim();
      if (!name) return;
      const d = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'trips_list'), { name, created_at: Date.now() });
      input.value = '';
      switchTrip(d.id);
      window.closeModal('tripModal');
    };

    // ===== 匯率 =====
    function renderRates() {
      $('ratesList').innerHTML = CURRENCIES.filter(c => c.code !== 'TWD').map(c => `
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-600">1 ${c.code} (${c.symbol})</span>
          <div class="flex items-center gap-2">
            <input type="number" step="0.001" value="${rates[c.code]}" onchange="window.setRate('${c.code}', this.value)" class="w-24 text-right border-b border-blue-200 focus:border-blue-500 outline-none text-sm font-black py-1 bg-transparent" />
            <span class="text-xs text-gray-300">TWD</span>
          </div>
        </div>`).join('');
    }
    window.setRate = async (code, val) => {
      const newRates = { ...rates, [code]: parseFloat(val) || 0 };
      rates = newRates;
      if (activeTripId) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { rates: newRates }, { merge: true });
    };

    // ===== 支出明細 =====
    function renderExpenses() {
      // 可選月份（依日期 YYYY-MM）
      const months = [...new Set(expenses.map(e => (e.date || '').slice(0, 7)).filter(Boolean))].sort().reverse();
      if (selectedMonth !== 'all' && !months.includes(selectedMonth)) selectedMonth = 'all';
      const mf = $('monthFilter');
      mf.innerHTML = `<option value="all">全部月份</option>` + months.map(m => {
        const [y, mm] = m.split('-');
        return `<option value="${m}">${y} 年 ${parseInt(mm, 10)} 月</option>`;
      }).join('');
      mf.value = selectedMonth;

      const list = selectedMonth === 'all' ? expenses : expenses.filter(e => (e.date || '').slice(0, 7) === selectedMonth);
      $('expenseCount').innerText = selectedMonth === 'all' ? `共 ${expenses.length} 筆` : `${list.length} / ${expenses.length} 筆`;
      const pmIcon = (m) => m === '信用卡' ? 'credit-card' : m === '行動支付' ? 'smartphone' : 'wallet';
      $('expenseList').innerHTML = list.length ? list.map(exp => `
        <div class="flex items-center gap-4 p-4 border border-gray-50 rounded-xl hover:bg-gray-50 group transition-all">
          <div class="w-14 h-14 bg-white border border-gray-100 rounded-lg flex items-center justify-center text-gray-200 shrink-0 shadow-sm overflow-hidden">
            ${exp.previewUrl ? `<img src="${exp.previewUrl}" alt="收據" class="w-full h-full object-cover" />` : `<i data-lucide="image" class="w-6 h-6"></i>`}
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-[10px] text-gray-400 mb-1 flex items-center flex-wrap gap-1.5">
              <span class="bg-gray-100 px-1.5 py-0.5 rounded font-bold">${esc(exp.date)}</span>
              <span class="bg-blue-50 text-blue-400 px-1.5 py-0.5 rounded font-bold">${esc(exp.category)}</span>
              <span class="bg-green-50 text-green-500 px-1.5 py-0.5 rounded font-bold flex items-center gap-1"><i data-lucide="${pmIcon(exp.paymentMethod)}" class="w-2.5 h-2.5"></i>${esc(exp.paymentMethod || '現金')}</span>
              ${exp.location ? `<span class="flex items-center gap-0.5 text-orange-400 font-bold"><i data-lucide="map-pin" class="w-2.5 h-2.5"></i>${esc(exp.location)}</span>` : ''}
            </div>
            <div class="text-sm truncate font-bold text-gray-700">${esc(exp.note)}</div>
            ${exp.remarks ? `<div class="text-[10px] text-gray-400 mt-0.5 italic flex items-center gap-1"><i data-lucide="align-left" class="w-2.5 h-2.5"></i>${esc(exp.remarks)}</div>` : ''}
            <div class="text-[10px] text-gray-400 mt-1 font-bold">${esc(exp.payer)} 支付 · ${esc(exp.splitMethod)}</div>
          </div>
          <div class="text-right">
            <div class="text-base font-black text-gray-700">${esc(exp.currency)} ${Math.round(exp.amount).toLocaleString()}</div>
            <div class="flex gap-3 justify-end mt-2 opacity-60 sm:opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="window.editExpense('${exp.dbId}')" title="編輯" class="text-blue-400 hover:text-blue-600"><i data-lucide="pencil" class="w-4 h-4"></i></button>
              <button onclick="window.deleteExpense('${exp.dbId}')" title="刪除" class="text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>`).join('') : `<div class="text-center py-16 text-gray-300 font-bold"><i data-lucide="receipt" class="w-10 h-10 mx-auto mb-2 opacity-20"></i><p>${selectedMonth === 'all' ? '尚無支出紀錄' : '此月份無紀錄'}</p></div>`;
      icons();
    }

    window.setMonthFilter = (v) => { selectedMonth = v; renderExpenses(); };

    window.deleteExpense = async (id) => {
      if (confirm('確定刪除？') && isAuthed) {
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`, id));
      }
    };

    // ===== 總額彙整 =====
    function renderSummary() {
      const sumCur = $('summaryCurrency').value;
      const container = $('summaryList');
      if (!expenses.length) { container.innerHTML = `<p class="text-gray-300 text-center py-4 font-bold">無數據</p>`; return; }
      let grandTWD = 0;
      const rows = expenses.map(exp => {
        const r = (rates[exp.currency] || 1) / (rates[sumCur] || 1);
        grandTWD += (parseFloat(exp.amount) || 0) * (rates[exp.currency] || 1);
        return `<div class="flex justify-between items-start border-b border-gray-50 pb-2 last:border-0">
          <div class="flex flex-col flex-1 mr-2 text-xs font-bold min-w-0">
            <span class="truncate">${esc(exp.note)}</span>
            <span class="text-[9px] text-gray-400 font-normal">1 ${esc(exp.currency)} : ${r.toFixed(2)} ${esc(sumCur)}</span>
          </div>
          <span class="text-blue-500 font-black shrink-0">${sumCur} ${Math.round(exp.amount * r).toLocaleString()}</span>
        </div>`;
      }).join('');
      const grandTarget = grandTWD / (rates[sumCur] || 1);
      container.innerHTML = `
        <div class="max-h-60 overflow-y-auto space-y-3 text-sm pr-1">${rows}</div>
        <div class="pt-4 border-t-2 border-blue-50 flex justify-between items-center text-lg font-black text-[#3B82F6]">
          <span class="text-xs text-blue-300 uppercase">總計折合</span>
          <span>${sumCur} ${Math.round(grandTarget).toLocaleString()}</span>
        </div>`;
    }

    // ===== 結算轉帳（兩兩沖銷）=====
    function computeSettlement() {
      const sumCur = $('settlementCurrency').value;
      const targetRate = rates[sumCur] || 1;
      const pairDebts = {};
      expenses.forEach(exp => {
        if (exp.splitMethod === '請客') return;
        const rate = rates[exp.currency] || 1;
        const amountTWD = (parseFloat(exp.amount) || 0) * rate;
        const payer = String(exp.payer);
        const parts = exp.participants || [];
        parts.forEach(p => {
          const pName = String(p);
          if (pName === payer) return;
          let share = 0;
          if (exp.splitMethod === '自訂金額') share = (parseFloat(exp.customAmounts?.[pName]) || 0) * rate;
          else if (exp.splitMethod === '代墊') { const others = parts.filter(i => String(i) !== payer); share = others.length ? amountTWD / others.length : 0; }
          else share = amountTWD / parts.length;
          if (share > 0) { if (!pairDebts[pName]) pairDebts[pName] = {}; pairDebts[pName][payer] = (pairDebts[pName][payer] || 0) + share; }
        });
      });
      const transfers = [];
      const seen = new Set();
      people.forEach(p1 => people.forEach(p2 => {
        if (p1 === p2) return;
        const key = [p1, p2].sort().join('::');
        if (seen.has(key)) return;
        seen.add(key);
        const a = (pairDebts[p1] && pairDebts[p1][p2]) || 0;
        const b = (pairDebts[p2] && pairDebts[p2][p1]) || 0;
        const diff = a - b;
        if (Math.abs(diff) > 0.01) {
          const from = diff > 0 ? p1 : p2;
          const to = diff > 0 ? p2 : p1;
          transfers.push({ from, to, amount: Math.abs(diff) / targetRate });
        }
      }));
      return transfers;
    }

    function getTransferDetails(from, to) {
      const sumCur = $('settlementCurrency').value;
      const targetRate = rates[sumCur] || 1;
      const details = [];
      expenses.forEach(exp => {
        if (exp.splitMethod === '請客') return;
        const payer = String(exp.payer);
        const parts = exp.participants || [];
        const rate = rates[exp.currency] || 1;
        const f = String(from), t = String(to);
        const shareOf = (name) => {
          if (exp.splitMethod === '自訂金額') return (parseFloat(exp.customAmounts?.[name]) || 0) * rate;
          if (exp.splitMethod === '代墊') { const others = parts.filter(p => String(p) !== payer); return others.length ? (exp.amount * rate) / others.length : 0; }
          return (exp.amount * rate) / parts.length;
        };
        if (payer === t && parts.includes(f)) { const s = shareOf(f); if (s > 0.01) details.push({ note: exp.note, amount: s / targetRate }); }
        if (payer === f && parts.includes(t)) { const s = shareOf(t); if (s > 0.01) details.push({ note: `(抵銷) ${exp.note}`, amount: -(s / targetRate) }); }
      });
      return details;
    }

    function renderSettlement() {
      const sumCur = $('settlementCurrency').value;
      const transfers = computeSettlement();
      const container = $('transfersList');
      if (!transfers.length) { container.innerHTML = `<p class="text-gray-300 text-center text-sm py-4 font-bold">目前平衡</p>`; return; }
      container.innerHTML = transfers.map(t => {
        const key = `${t.from}-${t.to}`;
        const expanded = expandedTransferKey === key;
        const details = expanded ? getTransferDetails(t.from, t.to) : [];
        return `<div class="border-b border-gray-50 last:border-0 pb-1">
          <div onclick="window.toggleTransfer('${esc(key)}')" class="flex items-center justify-between text-sm py-2 cursor-pointer hover:bg-gray-50 rounded px-1 font-bold">
            <span class="w-[30%] truncate">${esc(t.from)}</span>
            <div class="flex flex-col items-center flex-1 text-blue-500">
              <i data-lucide="chevron-right" class="w-3.5 h-3.5 transition-transform ${expanded ? 'rotate-90' : ''}"></i>
              <span class="text-[10px] font-black">${sumCur} ${Math.round(t.amount).toLocaleString()}</span>
            </div>
            <span class="w-[30%] truncate text-right">${esc(t.to)}</span>
          </div>
          ${expanded ? `<div class="mt-1 px-2 py-2 bg-gray-50 rounded-lg space-y-1.5">${details.map(d => `
            <div class="flex justify-between text-[10px]"><span class="truncate flex-1 mr-2 text-gray-500">${esc(d.note)}</span><span class="${d.amount < 0 ? 'text-green-600' : 'text-gray-400'}">${sumCur} ${Math.round(d.amount).toLocaleString()}</span></div>`).join('')}</div>` : ''}
        </div>`;
      }).join('');
      icons();
    }

    window.toggleTransfer = (key) => { expandedTransferKey = expandedTransferKey === key ? null : key; renderSettlement(); };

    // ===== 新增 / 編輯支出 =====
    function buildExpenseSelects() {
      $('expCategory').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
      $('expPayment').innerHTML = PAYMENT_METHODS.map(m => `<option value="${m}">${m}</option>`).join('');
      $('expSplitMethod').innerHTML = SPLIT_METHODS.map(s => `<option value="${s}">${s}</option>`).join('');
      $('expPayer').innerHTML = people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
      if ($('expCurrency').options.length === 0) fillCurrencySelect($('expCurrency'), 'TWD');
    }

    window.openAddExpense = () => {
      if (!activeTripId) { alert('請先建立或選擇帳本'); return; }
      if (!people.length) { alert('請先新增成員'); return; }
      editingId = null;
      previewUrl = null;
      customAmounts = {};
      participants = [...people];
      $('modalTitle').innerText = '新增支出';
      buildExpenseSelects();
      $('expNote').value = '';
      $('expAmount').value = '';
      $('expLocation').value = '';
      $('expRemarks').value = '';
      $('expCurrency').value = 'TWD';
      $('expCategory').value = '餐飲';
      $('expPayment').value = '現金';
      $('expSplitMethod').value = '平分';
      $('expPayer').value = people[0] || '';
      $('expDate').value = new Date().toISOString().split('T')[0];
      $('imgLabel').innerHTML = `<i data-lucide="camera" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">收據</span>`;
      updateParticipantsUI();
      window.updateEstimate();
      window.openModal('addExpenseModal');
      icons();
    };

    window.editExpense = (id) => {
      const exp = expensesCache[id];
      if (!exp) return;
      editingId = id;
      previewUrl = exp.previewUrl || null;
      customAmounts = exp.customAmounts || {};
      participants = exp.participants ? [...exp.participants] : [];
      $('modalTitle').innerText = '編輯支出';
      buildExpenseSelects();
      $('expNote').value = exp.note || '';
      $('expAmount').value = exp.amount ?? '';
      $('expLocation').value = exp.location || '';
      $('expRemarks').value = exp.remarks || '';
      $('expCurrency').value = exp.currency || 'TWD';
      $('expCategory').value = exp.category || '餐飲';
      $('expPayment').value = exp.paymentMethod || '現金';
      $('expSplitMethod').value = exp.splitMethod || '平分';
      $('expPayer').value = exp.payer || (people[0] || '');
      $('expDate').value = exp.date || new Date().toISOString().split('T')[0];
      $('imgLabel').innerHTML = previewUrl ? `<img src="${previewUrl}" alt="收據" class="w-full h-full object-cover" />` : `<i data-lucide="camera" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">收據</span>`;
      updateParticipantsUI();
      window.updateEstimate();
      window.openModal('addExpenseModal');
      icons();
    };

    function updateParticipantsUI() {
      $('participantsGroup').innerHTML = people.map(p => `
        <button onclick="window.toggleParticipant('${esc(p)}')" class="px-4 py-2 rounded-xl border text-xs font-black transition-all ${participants.includes(p) ? 'bg-blue-500 text-white border-blue-500 shadow-md shadow-blue-100' : 'bg-white border-gray-200 text-gray-400'}">${esc(p)}</button>`).join('');
    }
    window.toggleParticipant = (p) => {
      if (participants.includes(p)) participants = participants.filter(x => x !== p);
      else participants.push(p);
      updateParticipantsUI();
      window.updateEstimate();
    };
    window.setCustomAmount = (p, val) => { customAmounts[p] = parseFloat(val) || 0; };

    window.updateEstimate = () => {
      const amount = parseFloat($('expAmount').value) || 0;
      const curr = $('expCurrency').value;
      const method = $('expSplitMethod').value;
      const payer = $('expPayer').value;
      const box = $('estimateBox');
      if (!amount || !participants.length) { box.classList.add('hidden'); return; }
      box.classList.remove('hidden');
      let html = `<div class="flex items-center gap-1.5 text-blue-500 mb-1"><i data-lucide="pie-chart" class="w-3.5 h-3.5"></i><span class="text-[10px] font-black uppercase tracking-wider">預估分擔 (${curr})</span></div>`;
      if (method === '請客') {
        html += `<div class="text-center py-1 text-xs text-gray-400 italic font-bold">由 ${esc(payer)} 請客</div>`;
      } else if (method === '自訂金額') {
        html += `<div class="space-y-2 max-h-36 overflow-y-auto pr-1">` + participants.map(p => `
          <div class="flex justify-between items-center py-0.5"><span class="text-[11px] text-gray-500">${esc(p)}</span>
          <div class="flex items-center gap-1.5"><input type="number" value="${customAmounts[p] || ''}" oninput="window.setCustomAmount('${esc(p)}', this.value)" placeholder="0" class="w-20 text-right border-b border-blue-200 bg-transparent py-0.5 focus:border-blue-500 text-xs outline-none font-black" /><span class="text-[10px]">${curr}</span></div></div>`).join('') + `</div>`;
      } else {
        let shareAmt = 0, desc = '';
        if (method === '代墊') { const others = participants.filter(p => p !== payer); shareAmt = others.length ? amount / others.length : 0; desc = `除支付人外，其餘 ${others.length} 人平分`; }
        else { shareAmt = amount / participants.length; desc = `${participants.length} 人平分`; }
        html += `<div class="flex justify-between items-center py-1"><div class="text-xs text-gray-500 font-bold">${desc}</div><div class="text-base font-black text-blue-500"><span class="text-[10px] mr-1">${curr}</span>${shareAmt.toLocaleString(undefined, { maximumFractionDigits: 2 })}<span class="text-[10px] ml-1 text-gray-400">/ 人</span></div></div>`;
      }
      box.innerHTML = html;
      icons();
    };

    window.saveExpense = async () => {
      if (!isAuthed) return;
      const note = $('expNote').value.trim();
      const amount = parseFloat($('expAmount').value);
      if (!note || isNaN(amount) || !activeTripId || participants.length === 0) {
        alert('請填寫名稱、金額並選擇至少一位參與者');
        return;
      }
      const btn = $('saveBtn'); const loader = $('saveLoader');
      btn.disabled = true; loader.classList.add('active');
      try {
        const col = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
        const data = {
          note, amount,
          location: $('expLocation').value.trim(),
          remarks: $('expRemarks').value.trim(),
          currency: $('expCurrency').value,
          category: $('expCategory').value,
          paymentMethod: $('expPayment').value,
          date: $('expDate').value,
          splitMethod: $('expSplitMethod').value,
          payer: $('expPayer').value,
          participants: [...participants],
          customAmounts: { ...customAmounts },
          previewUrl: previewUrl || null,
          created_at: editingId && expensesCache[editingId] ? (expensesCache[editingId].created_at || Date.now()) : Date.now(),
          updated_at: serverTimestamp()
        };
        if (editingId) await updateDoc(doc(col, editingId), data);
        else await addDoc(col, data);
        window.closeModal('addExpenseModal');
        window.openModal('successModal');
      } catch (err) {
        console.error('儲存失敗', err);
        alert('儲存失敗，請確認網路與 Firebase 權限設定');
      } finally {
        btn.disabled = false; loader.classList.remove('active');
      }
    };

    // ===== 收據上傳 + AI 辨識 =====
    window.handleImgUpload = (input) => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const max = 800;
          let w = img.width, h = img.height;
          if (w > max) { h *= max / w; w = max; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          previewUrl = canvas.toDataURL('image/jpeg', 0.6);
          $('imgLabel').innerHTML = `<img src="${previewUrl}" alt="收據" class="w-full h-full object-cover" />`;
          if (GEMINI_API_KEY) analyzeReceipt(previewUrl.split(',')[1]);
        };
      };
    };

    async function analyzeReceipt(base64) {
      $('aiLoader').classList.remove('hidden');
      const prompt = '分析收據 JSON: { "merchant": "名稱", "amount": 數字, "currency": "TWD/JPY/USD...", "category": "類別", "date": "YYYY-MM-DD" }';
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/jpeg', data: base64 } }] }] })
        });
        const result = await res.json();
        const text = (result.candidates?.[0]?.content?.parts?.[0]?.text || '').replace(/```json|```/g, '');
        const data = JSON.parse(text);
        if (data.merchant) $('expNote').value = data.merchant;
        if (data.amount) $('expAmount').value = data.amount;
        if (data.currency && CURRENCIES.some(c => c.code === data.currency)) $('expCurrency').value = data.currency;
        if (data.category && CATEGORIES.includes(data.category)) $('expCategory').value = data.category;
        if (data.date) $('expDate').value = data.date;
        window.updateEstimate();
      } catch (err) { console.error('AI 辨識失敗', err); }
      finally { $('aiLoader').classList.add('hidden'); }
    }

    // ===== Modal helpers =====
    window.openModal = (id) => {
      if (id === 'ratesModal') renderRates();
      $(id).classList.add('active');
      icons();
    };
    window.closeModal = (id) => {
      // 起始帳本選擇頁：尚未選帳本時不可關閉
      if (id === 'tripModal' && !activeTripId) return;
      $(id).classList.remove('active');
    };

    // close modal on backdrop click
    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', (e) => {
      if (e.target !== m) return;
      if (m.id === 'tripModal' && !activeTripId) return;
      m.classList.remove('active');
    }));

    icons();
    init();
  </script>
</body>
