<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊分帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18.2.0",
      "react/jsx-runtime":"https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react":     "https://esm.sh/lucide-react@0.383.0",
      "firebase/app":     "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
      "firebase/auth":    "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
      "firebase/firestore":"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo } from 'react';
    import ReactDOM from 'react-dom/client';
    import { Camera, Plus, Trash2, Users, Receipt, CreditCard, ChevronRight, Loader2, Image as ImageIcon, Pencil, FileText, FolderOpen, CheckCircle2, X, Check, PieChart, ChevronDown, MapPin, AlignLeft, Smartphone, Wallet, Settings2 } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from 'firebase/firestore';

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyDwhrvO9igpNTDPkGZeZ8ocYDrNnVENk8o",
      authDomain: "money-89a0e.firebaseapp.com",
      databaseURL: "https://money-89a0e-default-rtdb.firebaseio.com",
      projectId: "money-89a0e",
      storageBucket: "money-89a0e.firebasestorage.app",
      messagingSenderId: "41518797533",
      appId: "1:41518797533:web:943b9330b0234de59f0134",
      measurementId: "G-SLTTYB5L2H"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const appId = "money-89a0e-trip-web";
    const apiKey = "";
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const CURRENCIES = [
      { code: 'TWD', symbol: '$' },
      { code: 'JPY', symbol: '¥' },
      { code: 'KRW', symbol: '₩' },
      { code: 'EUR', symbol: '€' },
      { code: 'USD', symbol: '$' }
    ];

    const DEFAULT_RATES = {
      TWD: 1, JPY: 0.21, KRW: 0.024, EUR: 34.5, USD: 32.0
    };

    const CATEGORIES = ['住宿', '餐飲', '交通', '購物', '娛樂', '雜費'];
    const PAYMENT_METHODS = ['現金', '信用卡', '行動支付'];
    const SPLIT_METHODS = ['平分', '代墊', '請客', '自訂金額'];

    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTripId, setActiveTripId] = useState(null);
      const [trips, setTrips] = useState([]);
      const [people, setPeople] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [rates, setRates] = useState(DEFAULT_RATES);
      const [newPerson, setNewPerson] = useState('');
      const [newTripName, setNewTripName] = useState('');
      
      const [isSaving, setIsSaving] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [showTripModal, setShowTripModal] = useState(false);
      const [showSuccessModal, setShowSuccessModal] = useState(false);
      const [showRatesModal, setShowRatesModal] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [settlementCurrency, setSettlementCurrency] = useState('TWD');
      const [summaryCurrency, setSummaryCurrency] = useState('TWD');

      const [editingTripId, setEditingTripId] = useState(null);
      const [editingTripName, setEditingTripName] = useState('');
      const [expandedTransferKey, setExpandedTransferKey] = useState(null);

      const [formData, setFormData] = useState({
        note: '', location: '', remarks: '', amount: '', currency: 'TWD', date: new Date().toISOString().split('T')[0],
        category: '餐飲', paymentMethod: '現金', splitMethod: '平分',
        payer: '', participants: [], customAmounts: {}, previewUrl: null
      });

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error('驗證失敗', error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const tripsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trips_list');
        const unsubTrips = onSnapshot(tripsRef, (snapshot) => {
          const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setTrips(list);
          if (list.length > 0 && !activeTripId) {
            setActiveTripId(list[0].id);
          }
        });
        return () => unsubTrips();
      }, [user]);

      useEffect(() => {
        if (!user || !activeTripId) return;
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId);
        const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (Array.isArray(data.people)) setPeople(data.people);
            if (data.rates) setRates({ ...DEFAULT_RATES, ...data.rates });
            else setRates(DEFAULT_RATES);
          } else {
            setDoc(settingsRef, { people: [], rates: DEFAULT_RATES });
          }
        });

        const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
        const unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() }));
          setExpenses(data);
        });

        return () => {
          unsubSettings();
          unsubExpenses();
        };
      }, [user, activeTripId]);

      const activeTripName = useMemo(() => {
        const trip = trips.find(t => t.id === activeTripId);
        return trip ? String(trip.name) : '未選取帳本';
      }, [trips, activeTripId]);

      const handleCreateTrip = async () => {
        if (!newTripName || !user) return;
        try {
          const tripsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trips_list');
          const newDoc = await addDoc(tripsRef, { name: String(newTripName), created_at: Date.now() });
          setActiveTripId(newDoc.id);
          setNewTripName('');
          setShowTripModal(false);
        } catch (e) { console.error(e); }
      };

      const handleUpdateTripName = async (tripId) => {
        if (!editingTripName.trim()) return;
        try {
          const tripRef = doc(db, 'artifacts', appId, 'public', 'data', 'trips_list', tripId);
          await updateDoc(tripRef, { name: editingTripName.trim() });
          setEditingTripId(null);
        } catch (e) { console.error(e); }
      };

      const handleDeleteTrip = async (tripId) => {
        if (!window.confirm("確定刪除此帳本？此動作將無法復原。")) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_list', tripId));
          if (activeTripId === tripId) {
            const remaining = trips.filter(t => t.id !== tripId);
            setActiveTripId(remaining.length > 0 ? remaining[0].id : null);
          }
        } catch (e) { console.error(e); }
      };

      const handleAddPerson = async () => {
        if (newPerson.trim() && activeTripId) {
          const newList = [...people, newPerson.trim()];
          setPeople(newList);
          const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId);
          await setDoc(settingsRef, { people: newList }, { merge: true });
          setNewPerson('');
        }
      };

      const handleUpdateRates = async (newRates) => {
        setRates(newRates);
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId);
        await setDoc(settingsRef, { rates: newRates }, { merge: true });
      };

      const settlement = useMemo(() => {
        const pairDebts = {}; 
        expenses.forEach(exp => {
          if (exp.splitMethod === '請客') return;
          const rate = rates[exp.currency] || 1;
          const amountInTWD = (parseFloat(exp.amount) || 0) * rate;
          const payer = String(exp.payer);
          const participants = exp.participants || [];

          participants.forEach(p => {
            const pName = String(p);
            if (pName === payer) return;
            let share = 0;
            if (exp.splitMethod === '自訂金額') {
              share = (parseFloat(exp.customAmounts?.[pName]) || 0) * rate;
            } else if (exp.splitMethod === '代墊') {
              const others = participants.filter(item => String(item) !== payer);
              share = others.length > 0 ? amountInTWD / others.length : 0;
            } else {
              share = amountInTWD / participants.length;
            }
            if (share > 0) {
              if (!pairDebts[pName]) pairDebts[pName] = {};
              pairDebts[pName][payer] = (pairDebts[pName][payer] || 0) + share;
            }
          });
        });

        const consolidated = [];
        const processedPairs = new Set();
        const targetRate = rates[settlementCurrency] || 1;

        people.forEach(p1 => {
          people.forEach(p2 => {
            if (p1 === p2) return;
            const pairKey = [p1, p2].sort().join('::');
            if (processedPairs.has(pairKey)) return;
            processedPairs.add(pairKey);
            const p1OwesP2 = (pairDebts[p1] && pairDebts[p1][p2]) || 0;
            const p2OwesP1 = (pairDebts[p2] && pairDebts[p2][p1]) || 0;
            const diff = p1OwesP2 - p2OwesP1;
            if (Math.abs(diff) > 0.01) {
              const from = diff > 0 ? p1 : p2;
              const to = diff > 0 ? p2 : p1;
              consolidated.push({ from, to, amount: Math.abs(diff) / targetRate });
            }
          });
        });
        return { transfers: consolidated };
      }, [expenses, people, settlementCurrency, rates]);

      const getTransferDetails = (from, to) => {
        const targetRate = rates[settlementCurrency] || 1;
        const details = [];
        expenses.forEach(exp => {
          if (exp.splitMethod === '請客') return;
          const payer = String(exp.payer);
          const participants = exp.participants || [];
          const rate = rates[exp.currency] || 1;
          const fromName = String(from);
          const toName = String(to);
          if (payer === toName && participants.includes(fromName)) {
            let shareInTWD = 0;
            if (exp.splitMethod === '自訂金額') {
              shareInTWD = (parseFloat(exp.customAmounts?.[fromName]) || 0) * rate;
            } else if (exp.splitMethod === '代墊') {
              const others = participants.filter(p => String(p) !== toName);
              shareInTWD = others.length > 0 ? (exp.amount * rate) / others.length : 0;
            } else {
              shareInTWD = (exp.amount * rate) / participants.length;
            }
            if (shareInTWD > 0.01) details.push({ note: exp.note, amount: shareInTWD / targetRate });
          }
          if (payer === fromName && participants.includes(toName)) {
            let offsetInTWD = 0;
            if (exp.splitMethod === '自訂金額') {
              offsetInTWD = (parseFloat(exp.customAmounts?.[toName]) || 0) * rate;
            } else if (exp.splitMethod === '代墊') {
              const others = participants.filter(p => String(p) !== fromName);
              offsetInTWD = others.length > 0 ? (exp.amount * rate) / others.length : 0;
            } else {
              offsetInTWD = (exp.amount * rate) / participants.length;
            }
            if (offsetInTWD > 0.01) details.push({ note: `(抵銷) ${exp.note}`, amount: -(offsetInTWD / targetRate) });
          }
        });
        return details;
      };

      const totalSummaryData = useMemo(() => {
        const totalsByCurrency = {};
        let grandTotalTWD = 0;
        expenses.forEach(exp => {
          const amt = parseFloat(exp.amount) || 0;
          totalsByCurrency[exp.currency] = (totalsByCurrency[exp.currency] || 0) + amt;
          grandTotalTWD += amt * (rates[exp.currency] || 1);
        });
        const targetRate = rates[summaryCurrency] || 1;
        return { byCurrency: totalsByCurrency, grandTotalTarget: grandTotalTWD / targetRate };
      }, [expenses, summaryCurrency, rates]);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async (ev) => {
          const img = new Image();
          img.src = ev.target.result;
          img.onload = async () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            const compressed = canvas.toDataURL('image/jpeg', 0.6);
            setFormData(prev => ({ ...prev, previewUrl: compressed }));
            setIsAnalyzing(true);
            try {
              const prompt = "分析收據 JSON: { \"merchant\": \"名稱\", \"amount\": 數字, \"currency\": \"TWD/JPY/USD...\", \"category\": \"類別\", \"date\": \"YYYY-MM-DD\" }";
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: compressed.split(',')[1] } }] }] })
              });
              const result = await res.json();
              const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
              const data = JSON.parse(text.replace(/```json|```/g, ''));
              setFormData(prev => ({
                ...prev,
                note: data.merchant || '', amount: data.amount?.toString() || '',
                currency: CURRENCIES.some(c => c.code === data.currency) ? data.currency : 'TWD',
                category: CATEGORIES.includes(data.category) ? data.category : '餐飲',
                date: data.date || prev.date
              }));
            } catch (err) { console.error(err); } finally { setIsAnalyzing(false); }
          };
        };
      };

      const openAddModal = () => {
        setFormData({ 
          note: '', location: '', remarks: '', amount: '', currency: 'TWD', date: new Date().toISOString().split('T')[0],
          category: '餐飲', paymentMethod: '現金', splitMethod: '平分',
          payer: people[0] || '', participants: [...people], customAmounts: {}, previewUrl: null 
        });
        setEditingId(null);
        setShowAddModal(true);
      };

      const handleSaveExpense = async () => {
        if (!formData.note || !formData.amount || !activeTripId || isSaving) return;
        setIsSaving(true);
        const expenseData = {
          ...formData, amount: parseFloat(formData.amount),
          created_at: editingId ? (expenses.find(e => e.dbId === editingId)?.created_at || Date.now()) : Date.now(),
          updated_at: serverTimestamp()
        };
        const colRef = collection(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`);
        try {
          if (editingId) { await updateDoc(doc(colRef, editingId), expenseData); }
          else { await addDoc(colRef, expenseData); }
          setShowAddModal(false);
          setShowSuccessModal(true);
        } catch (err) { console.error(err); } finally { setIsSaving(false); }
      };

      const handleCustomAmountChange = (person, val) => {
        setFormData(prev => ({
          ...prev,
          customAmounts: { ...prev.customAmounts, [person]: parseFloat(val) || 0 }
        }));
      };

      return (
        <div className="min-h-screen bg-[#F9FAFB] text-[#4B5563] font-bold p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            {/* Header */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
              <button onClick={() => setShowTripModal(true)} className="flex items-center gap-3 text-[#3B82F6] hover:bg-blue-50 px-4 py-2.5 rounded-lg border border-blue-100 transition-all bg-white shadow-sm">
                <FolderOpen size={20} />
                <div className="text-left font-bold">
                  <span className="block text-[10px] text-blue-400 uppercase tracking-wider">目前帳本</span>
                  <span className="text-lg leading-none">{activeTripName}</span>
                </div>
              </button>
              <button onClick={openAddModal} className="bg-[#3B82F6] text-white px-6 py-3 rounded-lg flex items-center gap-2 hover:bg-blue-600 shadow-lg active:scale-95 font-bold">
                <Plus size={20} /> 新增支出
              </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-2 text-gray-500 font-bold"><Users size={18} /><h2>成員名單</h2></div>
                    <button onClick={() => setShowRatesModal(true)} className="text-blue-500 hover:text-blue-600 flex items-center gap-1 text-xs font-bold"><Settings2 size={14} /> 匯率管理</button>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-4">
                    {people.map((p, idx) => (
                      <span key={idx} className="bg-[#F3F4F6] border border-[#E5E7EB] px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 font-bold">
                        {String(p)}
                        <button onClick={async () => {
                          const newList = people.filter((_, i) => i !== idx);
                          setPeople(newList);
                          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trip_settings', activeTripId), { people: newList }, { merge: true });
                        }} className="text-red-300 hover:text-red-500"><Trash2 size={12} /></button>
                      </span>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <input value={newPerson} onChange={e => setNewPerson(e.target.value)} placeholder="新成員" className="flex-1 border border-[#E5E7EB] rounded-lg px-3 py-2 text-sm bg-gray-50 font-bold" />
                    <button onClick={handleAddPerson} className="bg-white border border-[#E5E7EB] px-3 rounded-lg hover:bg-gray-50 text-gray-400"><Plus size={18} /></button>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2 text-gray-500 font-bold"><CreditCard size={18} /><h2>結算轉帳</h2></div>
                    <select value={settlementCurrency} onChange={e => setSettlementCurrency(e.target.value)} className="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold outline-none cursor-pointer">
                      {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                    </select>
                  </div>
                  <div className="space-y-3">
                    {settlement.transfers.length === 0 ? <p className="text-gray-300 text-center text-sm py-4">目前平衡</p> : 
                      settlement.transfers.map((t, i) => {
                        const key = `${t.from}-${t.to}`;
                        const isExpanded = expandedTransferKey === key;
                        const details = isExpanded ? getTransferDetails(t.from, t.to) : [];
                        return (
                          <div key={i} className="border-b border-gray-50 last:border-0 pb-2">
                            <div onClick={() => setExpandedTransferKey(isExpanded ? null : key)} className="flex items-center justify-between text-sm py-2 cursor-pointer hover:bg-gray-50 rounded px-1 font-bold">
                              <span className="w-[30%] truncate">{t.from}</span>
                              <div className="flex flex-col items-center flex-1 text-blue-500 font-bold">
                                <ChevronRight size={14} className={`transform transition-transform ${isExpanded ? 'rotate-90' : ''}`} />
                                <span className="text-[10px] font-black">{settlementCurrency} {Math.round(t.amount).toLocaleString()}</span>
                              </div>
                              <span className="w-[30%] truncate text-right">{t.to}</span>
                            </div>
                            {isExpanded && (
                              <div className="mt-1 px-2 py-2 bg-gray-50 rounded-lg space-y-1.5 font-bold animate-in slide-in-from-top-1 duration-200">
                                {details.map((d, idx) => (
                                  <div key={idx} className="flex justify-between text-[10px]">
                                    <span className="truncate flex-1 mr-2 text-gray-500">{d.note}</span>
                                    <span className={d.amount < 0 ? "text-green-600" : "text-gray-400"}>
                                      {settlementCurrency} {Math.round(d.amount).toLocaleString()}
                                    </span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })
                    }
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
                  <div className="flex justify-between items-center mb-4 font-bold">
                    <div className="flex items-center gap-2 text-gray-500 font-bold"><FileText size={18} /><h2>總額彙整</h2></div>
                    <select value={summaryCurrency} onChange={e => setSummaryCurrency(e.target.value)} className="bg-gray-50 border border-gray-100 text-xs px-2 py-1 rounded-md font-bold cursor-pointer">
                      {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
                    </select>
                  </div>
                  <div className="space-y-4">
                    {expenses.length > 0 && (
                      <div className="space-y-3 font-bold">
                        <div className="max-h-60 overflow-y-auto space-y-3 text-sm">
                          {expenses.map(exp => {
                            const rate = rates[exp.currency] / rates[summaryCurrency];
                            return (
                              <div key={exp.dbId} className="flex justify-between items-start border-b border-gray-50 pb-2 last:border-0">
                                <div className="flex flex-col flex-1 mr-2 text-xs font-bold">
                                  <span className="truncate">{exp.note}</span>
                                  <span className="text-[9px] text-gray-400 font-normal">1 {exp.currency} : {rate.toFixed(2)} {summaryCurrency}</span>
                                </div>
                                <div className="text-right flex flex-col shrink-0 font-black">
                                  <span className="text-blue-500">{summaryCurrency} {Math.round(exp.amount * rate).toLocaleString()}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div className="pt-4 border-t-2 border-blue-50 flex justify-between items-center text-lg font-black text-[#3B82F6]">
                          <span className="text-xs text-blue-300 uppercase">總計折合</span>
                          <span>{summaryCurrency} {Math.round(totalSummaryData.grandTotalTarget).toLocaleString()}</span>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="md:col-span-2 space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-[#E5E7EB]">
                  <div className="flex items-center justify-between mb-6 font-bold">
                    <div className="flex items-center gap-2 text-gray-500 font-bold"><Receipt size={18} /><h2>支出明細</h2></div>
                    <div className="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded font-black">共 {expenses.length} 筆</div>
                  </div>
                  <div className="space-y-4">
                    {expenses.length === 0 ? <div className="text-center py-16 text-gray-300 font-bold"><Receipt size={40} className="mx-auto mb-2 opacity-20" /><p>尚無支出紀錄</p></div> : 
                      expenses.map(exp => (
                        <div key={exp.dbId} className="flex items-center gap-4 p-4 border border-gray-50 rounded-xl hover:bg-gray-50 group transition-all">
                          <div className="w-14 h-14 bg-white border border-gray-100 rounded-lg flex items-center justify-center text-gray-200 shrink-0 shadow-sm overflow-hidden">{exp.previewUrl ? <img src={exp.previewUrl} className="w-full h-full object-cover" /> : <ImageIcon size={24} />}</div>
                          <div className="flex-1 min-w-0 font-bold">
                            <div className="text-[10px] text-gray-400 mb-1 flex items-center flex-wrap gap-2">
                              <span className="bg-gray-100 px-1.5 py-0.5 rounded">{exp.date}</span>
                              <span className="bg-blue-50 text-blue-400 px-1.5 py-0.5 rounded">{exp.category}</span>
                              <span className="bg-green-50 text-green-500 px-1.5 py-0.5 rounded flex items-center gap-1">
                                {exp.paymentMethod === '信用卡' && <CreditCard size={10} />}
                                {exp.paymentMethod === '行動支付' && <Smartphone size={10} />}
                                {exp.paymentMethod === '現金' && <Wallet size={10} />}
                                {exp.paymentMethod || '現金'}
                              </span>
                              {exp.location && <span className="flex items-center gap-0.5 text-orange-400 font-bold"><MapPin size={10} /> {exp.location}</span>}
                            </div>
                            <div className="text-sm truncate text-gray-700 font-bold">{exp.note}</div>
                            {exp.remarks && <div className="text-[9px] text-gray-400 font-normal mt-0.5 italic flex items-center gap-1"><AlignLeft size={8} /> {exp.remarks}</div>}
                            <div className="text-[10px] text-gray-400 mt-1 font-normal font-bold">{exp.payer} 支付</div>
                          </div>
                          <div className="text-right font-bold">
                            <div className="text-base font-black text-gray-700">{exp.currency} {Math.round(exp.amount).toLocaleString()}</div>
                            <div className="flex gap-3 justify-end mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => { setFormData({ ...exp, location: exp.location || '', remarks: exp.remarks || '', paymentMethod: exp.paymentMethod || '現金' }); setEditingId(exp.dbId); setShowAddModal(true); }} className="text-blue-400 hover:text-blue-600"><Pencil size={16} /></button>
                              <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `expenses_${activeTripId}`, exp.dbId))} className="text-red-300 hover:text-red-500"><Trash2 size={16} /></button>
                            </div>
                          </div>
                        </div>
                      ))
                    }
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* 匯率管理 Modal */}
          {showRatesModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden font-bold">
                <div className="p-5 border-b flex justify-between items-center bg-gray-50 font-bold"><h2 className="text-base font-black flex items-center gap-2 text-gray-700"><Settings2 size={18} /> 匯率管理</h2><button onClick={() => setShowRatesModal(false)}><X size={20} /></button></div>
                <div className="p-6 space-y-5">
                  {CURRENCIES.filter(c => c.code !== 'TWD').map(curr => (
                    <div key={curr.code} className="flex items-center justify-between">
                      <span className="text-sm text-gray-600">1 {curr.code} ({curr.symbol})</span>
                      <div className="flex items-center gap-2 font-bold"><input type="number" step="0.001" value={rates[curr.code]} onChange={e => handleUpdateRates({ ...rates, [curr.code]: parseFloat(e.target.value) || 0 })} className="w-24 text-right border-b border-blue-200 focus:border-blue-500 outline-none text-sm font-black py-1" /><span className="text-xs text-gray-300">TWD</span></div>
                    </div>
                  ))}
                  <button onClick={() => setShowRatesModal(false)} className="w-full bg-[#3B82F6] text-white py-3 rounded-xl font-black text-sm hover:bg-blue-600 shadow-lg">完成設定</button>
                </div>
              </div>
            </div>
          )}

          {/* Trip Modal */}
          {showTripModal && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-[#E5E7EB] overflow-hidden font-bold">
                <div className="p-5 border-b flex justify-between items-center bg-gray-50 font-bold"><h2 className="text-base font-black text-gray-700">更換帳本</h2><button onClick={() => setShowTripModal(false)}><X size={20} /></button></div>
                <div className="p-6 space-y-4 max-h-96 overflow-y-auto">
                  {trips.map(t => (
                    <div key={t.id} className="flex gap-2 items-center group font-bold">
                      {editingTripId === t.id ? (
                        <div className="flex-1 flex gap-2"><input value={editingTripName} onChange={e => setEditingTripName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleUpdateTripName(t.id)} className="flex-1 border-2 border-blue-400 rounded-xl px-4 py-2 text-sm outline-none font-bold" autoFocus /><button onClick={() => handleUpdateTripName(t.id)} className="text-green-500 p-2"><Check size={20} /></button></div>
                      ) : (
                        <>
                          <button onClick={() => { setActiveTripId(t.id); setShowTripModal(false); }} className={`flex-1 text-left p-4 rounded-xl border-2 flex items-center justify-between ${activeTripId === t.id ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-gray-50 hover:border-blue-200 hover:bg-gray-50'}`}><span>{t.name}</span>{activeTripId === t.id && <ChevronRight size={16} />}</button>
                          <div className="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => { setEditingTripId(t.id); setEditingTripName(t.name); }} className="p-2 text-gray-400 hover:text-blue-500"><Pencil size={16} /></button><button onClick={() => handleDeleteTrip(t.id)} className="p-2 text-gray-400 hover:text-red-500"><Trash2 size={16} /></button></div>
                        </>
                      )}
                    </div>
                  ))}
                  <div className="pt-6 border-t border-gray-100 flex gap-2"><input value={newTripName} onChange={e => setNewTripName(e.target.value)} placeholder="新帳本" className="flex-1 border border-gray-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-blue-400 bg-gray-50 font-bold" /><button onClick={handleCreateTrip} className="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600"><Plus size={20} /></button></div>
                </div>
              </div>
            </div>
          )}

          {/* Add Modal */}
          {showAddModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-2 z-50 overflow-y-auto">
              <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden font-bold max-h-[98vh] flex flex-col scale-95 sm:scale-100 origin-center transition-transform">
                <div className="p-3 border-b flex justify-between items-center bg-gray-50 shrink-0">
                  <h2 className="text-sm font-black text-gray-700">{editingId ? '編輯支出' : '新增支出'}</h2>
                  <button onClick={() => setShowAddModal(false)} className="p-1"><X size={18} /></button>
                </div>
                
                <div className="p-4 space-y-3 overflow-y-auto">
                  <div className="flex gap-4 items-center">
                    <div className="relative group w-16 h-16 shrink-0 font-bold">
                      <input type="file" id="img-up" className="hidden" onChange={handleFileUpload} />
                      <label htmlFor="img-up" className="w-full h-full bg-gray-50 border border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer text-gray-400 hover:bg-gray-100 transition-all overflow-hidden text-[8px] font-bold">
                        {formData.previewUrl ? <img src={formData.previewUrl} className="w-full h-full object-cover" /> : <><Camera size={18} /><span className="mt-1">收據</span></>}
                      </label>
                      {isAnalyzing && <div className="absolute inset-0 bg-white/80 flex items-center justify-center rounded-lg"><Loader2 className="animate-spin text-blue-500" size={16} /></div>}
                    </div>
                    <div className="flex-1 space-y-2">
                      <input value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} placeholder="項目名稱" className="w-full border-b border-gray-200 py-0.5 focus:border-blue-500 outline-none text-base bg-transparent font-bold" />
                      <div className="flex gap-2 items-center font-bold">
                        <input type="number" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} placeholder="金額" className="flex-1 border-b border-gray-200 py-0.5 focus:border-blue-500 outline-none text-lg font-black bg-transparent" />
                        <select value={formData.currency} onChange={e => setFormData({...formData, currency: e.target.value})} className="border-b border-gray-200 bg-transparent text-gray-500 focus:border-blue-500 cursor-pointer text-xs font-bold">{CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.code}</option>)}</select>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 gap-2 font-bold">
                    <div className="relative font-bold"><MapPin size={12} className="absolute left-2.5 top-2.5 text-gray-400" /><input value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} placeholder="地點" className="w-full pl-8 pr-2 py-2 border border-gray-100 rounded-lg bg-gray-50 focus:border-blue-500 outline-none text-xs font-bold" /></div>
                    <div className="relative font-bold"><AlignLeft size={12} className="absolute left-2.5 top-2.5 text-gray-400" /><input value={formData.remarks} onChange={e => setFormData({...formData, remarks: e.target.value.slice(0, 50)})} placeholder="備註 (50字內)" maxLength={50} className="w-full pl-8 pr-2 py-2 border border-gray-100 rounded-lg bg-gray-50 focus:border-blue-500 outline-none text-xs font-bold" /></div>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs font-bold">
                    <div><label className="text-gray-400 text-[9px] block mb-1 uppercase font-bold">分類</label><select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full border border-gray-100 rounded-lg p-2 bg-gray-50 cursor-pointer font-bold">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                    <div><label className="text-gray-400 text-[9px] block mb-1 uppercase font-bold">支付方式</label><select value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})} className="w-full border border-gray-100 rounded-lg p-2 bg-gray-50 cursor-pointer font-bold">{PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                    <div><label className="text-gray-400 text-[9px] block mb-1 uppercase font-bold">模式</label><select value={formData.splitMethod} onChange={e => setFormData({...formData, splitMethod: e.target.value})} className="w-full border border-gray-100 rounded-lg p-2 bg-gray-50 cursor-pointer font-bold">{SPLIT_METHODS.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    <div><label className="text-gray-400 text-[9px] block mb-1 uppercase font-bold">支付人</label><select value={formData.payer} onChange={e => setFormData({...formData, payer: e.target.value})} className="w-full border border-gray-100 rounded-lg p-2 bg-gray-50 cursor-pointer font-bold">{people.map(p => <option key={String(p)} value={String(p)}>{String(p)}</option>)}</select></div>
                  </div>

                  <div><label className="text-gray-400 text-[9px] block mb-1 uppercase font-bold">日期</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full border border-gray-100 rounded-lg p-2 bg-gray-50 text-xs font-bold" /></div>

                  <div className="space-y-2 font-bold">
                    <label className="text-gray-400 text-[9px] block uppercase font-bold">參與者</label>
                    <div className="flex flex-wrap gap-1.5 font-bold">
                      {people.map((p, idx) => (<button key={idx} onClick={() => setFormData(prev => ({...prev, participants: prev.participants.includes(p) ? prev.participants.filter(x => x !== p) : [...prev.participants, p]}))} className={`px-3 py-1.5 rounded-lg border text-[10px] transition-all font-bold ${formData.participants.includes(p) ? 'bg-blue-500 text-white border-blue-500' : 'bg-white border-gray-200 text-gray-400'}`}>{String(p)}</button>))}
                    </div>
                  </div>

                  {formData.amount && formData.participants.length > 0 && (
                    <div className="bg-blue-50/50 border border-blue-100 rounded-lg p-3 space-y-2 font-bold">
                      <div className="flex items-center gap-1.5 text-blue-500 font-bold"><PieChart size={12} /><span className="text-[10px] uppercase font-black">預估分擔 ({formData.currency})</span></div>
                      {formData.splitMethod === '自訂金額' ? (
                        <div className="space-y-2 font-bold max-h-32 overflow-y-auto pr-1">
                          {formData.participants.map(p => (
                            <div key={p} className="flex justify-between items-center py-0.5"><span className="text-[10px] text-gray-500">{p}</span><div className="flex items-center gap-1.5 font-bold"><input type="number" value={formData.customAmounts?.[p] || ''} onChange={(e) => handleCustomAmountChange(p, e.target.value)} className="w-16 text-right border-b border-blue-200 bg-transparent py-0.5 focus:border-blue-500 text-xs outline-none font-black" placeholder="0" /><span className="text-[9px]">{formData.currency}</span></div></div>
                          ))}
                        </div>
                      ) : formData.splitMethod === '請客' ? (
                        <div className="text-center py-1 text-[10px] text-gray-400 italic font-bold">由 {formData.payer} 請客</div>
                      ) : (
                        <div className="flex justify-between items-center py-1 font-bold">
                          <div className="text-[10px] text-gray-500 font-normal">{formData.splitMethod === '代墊' ? (<>除支付人外其餘平分</>) : (<>全員平分</>)}</div>
                          <div className="text-sm font-black text-blue-500">
                            <span className="text-[10px] mr-1">{formData.currency}</span>{(() => { const amt = parseFloat(formData.amount); if (formData.splitMethod === '代墊') { const others = formData.participants.filter(p => String(p) !== formData.payer); return others.length > 0 ? Math.round(amt / others.length).toLocaleString() : "0"; } return Math.round(amt / formData.participants.length).toLocaleString(); })()}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="p-4 bg-white border-t border-gray-50 shrink-0">
                  <button onClick={handleSaveExpense} disabled={isSaving} className="w-full bg-[#3B82F6] text-white py-3 rounded-lg font-black text-sm hover:bg-blue-600 transition-all shadow-md active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
                    {isSaving ? <Loader2 className="animate-spin" size={16} /> : "確認儲存"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Success Modal */}
          {showSuccessModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-[100] transition-all">
              <div className="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-8 flex flex-col items-center font-bold">
                <div className="bg-green-50 text-green-500 p-4 rounded-full mb-4"><CheckCircle2 size={40} /></div>
                <h2 className="text-lg font-black text-gray-700 mb-6">已儲存</h2>
                <button onClick={() => setShowSuccessModal(false)} className="w-full bg-[#3B82F6] text-white py-3 rounded-xl font-black text-sm hover:bg-blue-600 shadow-lg">確認</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
